<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Entry Tickets</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      background: #000;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 20px;
    }
    h1 { font-size: 2.2em; color: #fff; margin-bottom: 40px; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
      max-width: 640px;
      width: 100%;
    }
    .card {
      background: #111; border-radius: 8px; padding: 24px;
      text-decoration: none; color: #fff;
      transition: background 0.2s;
    }
    .card:hover { background: #222; }
    .card-title { font-size: 1.15em; font-weight: bold; color: #ffdd00; }
    .card-dir { font-size: 0.85em; color: #888; margin-top: 4px; }
  </style>
</head>
<body>
  <h1>Entry Tickets</h1>
  <div class="grid">
      <a href="entry-ticket-1/" class="card">
        <div class="card-title">Entry Ticket 1</div>
        <div class="card-dir">entry-ticket-1</div>
      </a>
      <a href="entry-ticket-2/" class="card">
        <div class="card-title">Entry Ticket 2</div>
        <div class="card-dir">entry-ticket-2</div>
      </a>
      <a href="entry-ticket-3/" class="card">
        <div class="card-title">Entry Ticket 3</div>
        <div class="card-dir">entry-ticket-3</div>
      </a>
  </div>
</body>
</html>
