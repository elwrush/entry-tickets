<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
        <title><!-- TEST_TITLE --></title>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reveal.css" />
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/theme/black.css" />
        <style>
            /* ─── Entry Ticket Styles ─── */
            /* Black background, white Arial text, unadorned */
            .reveal { font-family: Arial, sans-serif; background: #000; }
            .reveal h1, .reveal h2, .reveal h3, .reveal h4, .reveal h5, .reveal h6,
            .reveal p, .reveal li, .reveal ol, .reveal ul, .reveal span, .reveal div {
                font-family: Arial, sans-serif !important;
                color: #fff !important;
                text-shadow: none !important;
            }
            .reveal em, .reveal i { font-family: Arial, sans-serif !important; }
            .reveal strong, .reveal b { font-family: Arial, sans-serif !important; }
            .reveal ol { padding-left: 1.5em; }
            .reveal li { margin-bottom: 0.3em; }
            .reveal .instruction {
                font-size: 1.1em;
                font-style: italic;
                color: #ccc !important;
                margin-bottom: 0.5em;
            }
            .reveal .phonemic {
                font-size: 1.6em;
            }
            .reveal .mc-word {
                font-size: 1.4em;
                font-weight: bold;
                margin-bottom: 0.5em;
            }
            .reveal .mc-option {
                font-size: 1.0em;
                margin-bottom: 0.4em;
            }
            .reveal .dictation-blank {
                color: #888 !important;
                font-style: italic;
            }
            .reveal .tf-question {
                font-size: 1.1em;
                margin-bottom: 0.8em;
            }
            .reveal .short-q {
                font-size: 1.2em;
            }
            .reveal .end-title {
                font-size: 2.8em;
                margin-bottom: 0.3em;
            }
            .reveal .end-line {
                font-size: 1.4em;
                margin: 0.2em 0;
            }
            .reveal section { background: #000 !important; }

            /* ─── Countdown timer ─── */
            .countdown {
                position: fixed; bottom: 20px; right: 20px;
                background: rgba(255,255,255,0.15);
                padding: 6px 14px;
                border-radius: 4px;
                font-family: Arial, sans-serif;
                font-size: 1.2em; font-weight: bold;
                color: #fff; z-index: 100;
                display: none;
            }
            .countdown.warning { color: #ffdd00; }
            .countdown.expired { color: #f44336; }
        </style>
    </head>
    <body>
        <div class="reveal">
            <div class="slides">

                <!-- SLIDES WILL BE SPLICED HERE -->

            </div>
        </div>

        <div id="countdown" class="countdown"></div>

        <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reveal.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/notes/notes.js"></script>

        <script>
            // ─── Auto-Advance Timer Plugin ───
            var EntryTicketTimer = {
                id: "entry-ticket-timer",
                init: function (deck) {
                    var countdownEl = document.getElementById("countdown");
                    var intervalId = null;

                    function clearTimer() {
                        if (intervalId) {
                            clearInterval(intervalId);
                            intervalId = null;
                        }
                        countdownEl.style.display = "none";
                        countdownEl.className = "countdown";
                    }

                    deck.on("slidechanged", function (event) {
                        clearTimer();

                        var slide = event.currentSlide;
                        var timerVal = slide.getAttribute("data-timer");
                        if (timerVal) {
                            var seconds = parseInt(timerVal, 10);
                            if (!isNaN(seconds) && seconds > 0) {
                                var remaining = seconds;
                                countdownEl.textContent = remaining + "s";
                                countdownEl.style.display = "block";
                                intervalId = setInterval(function () {
                                    remaining--;
                                    if (remaining <= 0) {
                                        clearTimer();
                                        deck.next();
                                    } else {
                                        countdownEl.textContent = remaining + "s";
                                        if (remaining <= 5) {
                                            countdownEl.className = "countdown warning";
                                        }
                                    }
                                }, 1000);
                            }
                        }

                        // Auto-play audio on dictation slides
                        var audios = slide.querySelectorAll("audio[data-autoplay]");
                        if (audios.length > 0 && !slide.hasAttribute("data-timer")) {
                            var audioEndCount = 0;
                            audios.forEach(function (a) {
                                a.addEventListener("ended", function () {
                                    audioEndCount++;
                                    if (audioEndCount >= audios.length) {
                                        // All audio finished — wait 2s buffer then advance
                                        setTimeout(function () {
                                            if (deck.getCurrentSlide() === slide) {
                                                deck.next();
                                            }
                                        }, 2000);
                                    }
                                });
                                a.play().catch(function () {});
                            });
                        }
                    });

                    deck.on("paused", function () {
                        clearTimer();
                    });
                },
            };

            Reveal.initialize({
                history: true,
                slideNumber: false,
                transition: "none",
                width: 1280,
                height: 720,
                autoAnimateUnmatched: true,
                plugins: [
                    EntryTicketTimer,
                    RevealNotes,
                ],
            });
        </script>
    </body>
</html>
